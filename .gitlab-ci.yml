variables:
  GIT_DEPTH: "0"
  GIT_STRATEGY: clone

stages:
  - sync

sync_to_github:
  stage: sync
  image: alpine:3.20
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  before_script:
    - apk add --no-cache bash git
  script:
    - |
      if [ -z "${GITHUB_TOKEN:-}" ]; then
        echo "GITHUB_TOKEN is not set" >&2
        exit 1
      fi
      git config user.name "GitLab Sync Bot"
      git config user.email "gitlab-sync-bot@basarsoft.local"
      git remote remove github 2>/dev/null || true
      git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/basarsoft-arge/${CI_PROJECT_NAME}.git"
      git push --prune github '+refs/heads/*:refs/heads/*'
      git push --prune github '+refs/tags/*:refs/tags/*'
